databases:
  - name: case-review-db
    databaseName: case_review
    user: case_user
    plan: free

services:
  - type: web
    name: case-review-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: case-review-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
